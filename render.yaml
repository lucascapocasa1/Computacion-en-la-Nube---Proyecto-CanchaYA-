services:
  - type: web
    name: canchas-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: canchas-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://bitter-surf-d556.lucascapocasa1.workers.dev"
      - key: FRONTEND_URL
        value: "https://bitter-surf-d556.lucascapocasa1.workers.dev"
      - key: BACKEND_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

databases:
  - name: canchas-db
    databaseName: canchas
    user: canchas_user
    plan: free
