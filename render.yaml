services:
  - type: web
    name: canchas-api
    runtime: docker
    region: oregon
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: canchas-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://computacion-en-la-nube---proyecto-canchaya.pages.dev,http://localhost:5500,http://127.0.0.1:5500"
      - key: FRONTEND_URL
        value: "https://computacion-en-la-nube---proyecto-canchaya.pages.dev"
      - key: BACKEND_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

databases:
  - name: canchas-db
    databaseName: canchas
    user: canchas_user
    plan: free
