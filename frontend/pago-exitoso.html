<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago exitoso — CanchaYa</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f0d; --green: #22c55e; --text: #e8f5e9; --muted: #6b8c72;
      --surface: #111a14; --border: #1e3020;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Barlow', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 48px 40px;
      text-align: center; max-width: 440px; width: 100%;
    }
    .icon { font-size: 5rem; animation: pop .5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--green); margin: 16px 0 8px; }
    p { color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    a { display: inline-block; background: var(--green); color: #000; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-family: 'Barlow Condensed', sans-serif; font-size: 1.1rem; font-weight: 700; transition: background .2s; }
    a:hover { background: #4ade80; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>¡Pago exitoso!</h1>
    <p>Tu reserva está confirmada y el pago fue aprobado por Mercado Pago.<br>Revisá tu email para los detalles.</p>
    <a href="index.html">Volver al inicio</a>
  </div>
  <script>
    // Obtener reserva_id de la URL (para mostrar info adicional si se desea)
    const params = new URLSearchParams(window.location.search);
    const reservaId = params.get("reserva_id");
    if (reservaId) {
      document.querySelector("p").innerHTML +=
        `<br><small style="color:#22c55e">Reserva #${reservaId}</small>`;
    }
  </script>
</body>
</html>
